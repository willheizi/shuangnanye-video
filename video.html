<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双南液视频</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    /* 把背景改成黑色，和主页面一致，消除白色边距 */
    html, body {height: 100%; background: #000;}
    /* 视频按 2.35:1 比例填充，消除黑/白条 */
    .video-container {
      width: 100%;
      height: 0;
      padding-bottom: 42.55%; /* 544 ÷ 1280 ≈ 0.4255，匹配你的视频分辨率 */
      position: relative;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 填满容器，不留黑边 */
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video controls preload="metadata" src="https://willheizi.github.io/shuangnanye-video/tang.mp4"></video>
  </div>
</body>
</html>
