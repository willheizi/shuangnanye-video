<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双南液视频</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* 彻底清除页面所有边距和白色背景 */
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden; /* 隐藏任何可能溢出的白边 */
    }
    /* 容器严格匹配视频 1280×544 比例 */
    .video-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 强制填满，不留任何黑/白边 */
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video controls preload="metadata" src="https://willheizi.github.io/shuangnanye-video/tang.mp4"></video>
  </div>
</body>
</html>
